name: Gemini AI Code Reviewer

on:
  # This action strictly requires 'issue_comment' to function
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-review:
    runs-on: ubuntu-latest
    # Security Gate: Only trigger if it's a PR comment, contains the command, 
    # and is written by a trusted repository member (Owner, Member, Collaborator)
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/gemini-review') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    steps:
      - name: Workflow Trigger Info
        run: |
          echo "Triggered by comment from: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"

      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: truongnh1992/gemini-ai-code-reviewer@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          EXCLUDE: "package-lock.json,*.yml,*.yaml"
