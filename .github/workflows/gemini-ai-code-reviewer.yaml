name: Gemini AI Code Reviewer

on:
  # Triggers automatically when a PR is opened, updated, or reopened
  pull_request_target:
    types: [opened, synchronize, reopened]
  # Triggers when a comment is left on a PR
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-review:
    runs-on: ubuntu-latest
    # The Security & Bot Gate:
    # 1. Ignore ALL automated events triggered by bots (like Dependabot opening a PR)
    # 2. Run IF it's an auto-trigger from a human (pull_request_target)
    # 3. OR IF it's a comment, contains the command, AND the author is a trusted maintainer
    if: >
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'pull_request_target' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '/gemini-review') &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
        )
      )
    steps:
      - name: Workflow Trigger Info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Sender: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: truongnh1992/gemini-ai-code-reviewer@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_KEY }}
          EXCLUDE: "package-lock.json,*.yml,*.yaml"
